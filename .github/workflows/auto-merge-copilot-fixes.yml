name: auto-merge-copilot-fixes

on:
  pull_request:
    types: [synchronize, opened, reopened]

jobs:
  auto-merge:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── Step 1: Merge the PR (--admin bypasses protections) ──
      - name: Merge Copilot PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --merge \
            --repo "$REPO" \
            --delete-branch \
            --admin
          echo "✅ Merged and deleted branch for PR #$PR_NUMBER"