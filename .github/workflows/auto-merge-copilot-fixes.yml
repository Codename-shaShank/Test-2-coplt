name: auto-merge-copilot-fixes

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]

jobs:
  auto-merge:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        startsWith(github.event.workflow_run.head_branch, 'copilot/')  }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── Step 1: Resolve the PR number ─────────────────────────
      - name: Resolve PR number
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUMBER=$(gh api "repos/$REPO/pulls?head=${REPO%%/*}:$BRANCH&state=open" \
            --jq '.[0].number // empty')

          if [[ -z "$PR_NUMBER" ]]; then
            echo "⚠️ No open PR found for branch $BRANCH. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "✅ Found PR #$PR_NUMBER"

      # ── Step 2: Auto-approve the Copilot PR ──────────────────
      # Uses GITHUB_TOKEN so the approver is a different identity
      # than the PR author (GH_PAT_FOR_COPILOT), satisfying
      # branch protection "required reviews" rules.
      - name: Auto-approve Copilot PR
        if: steps.find_pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          gh pr review "$PR_NUMBER" \
            --approve \
            --repo "$REPO" \
            --body "✅ Auto-approved: CI passed on Copilot fix branch."

      # ── Step 3: Merge the PR (--admin bypasses protections) ──
      - name: Merge Copilot PR
        if: steps.find_pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --merge \
            --repo "$REPO" \
            --delete-branch \
            --admin
          echo "✅ Merged and deleted branch for PR #$PR_NUMBER"